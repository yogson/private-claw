<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Admin Login — Personal AI Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/css/tabler.min.css"/>
</head>
<body class="antialiased d-flex flex-column">
<div class="page page-center">
  <div class="container container-tight py-4">
    <div class="text-center mb-4">
      <span class="h2 fw-bold">Personal AI Assistant</span>
      <span class="ms-2 badge bg-azure text-white">Admin</span>
    </div>

    <div class="card card-md">
      <div class="card-body">
        <h2 class="h2 text-center mb-4">Sign in to continue</h2>

        {% if error %}
        <div class="alert alert-danger" role="alert">
          <div class="d-flex">
            <div>{{ error }}</div>
          </div>
        </div>
        {% endif %}

        <form action="/admin/login" method="post" autocomplete="off">
          <div class="mb-3">
            <label class="form-label" for="token">Admin Token</label>
            <input
              type="password"
              id="token"
              name="token"
              class="form-control"
              placeholder="Enter admin token"
              required
              autofocus
              autocomplete="current-password"
            />
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">Sign in</button>
          </div>
        </form>
      </div>
    </div>

    <div class="text-center text-muted mt-3 small">
      Set <code>ASSISTANT_ADMIN_TOKEN</code> to configure the admin token.
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta21/dist/js/tabler.min.js"></script>
</body>
</html>
