# Tools configuration: canonical catalog of ALL available tools
# Capabilities (config/capabilities/*.yaml) select which subset the agent can use
# enabled=false acts as global kill-switch; tools are enabled by default
# Environment override prefix: ASSISTANT_TOOLS_

tools:
  - tool_id: memory_search
    entrypoint: assistant.agent.tools.memory_search:memory_search
    enabled: true

  - tool_id: memory_propose_update
    entrypoint: assistant.agent.tools.memory_propose_update:memory_propose_update
    enabled: true

  - tool_id: ask_question
    entrypoint: assistant.agent.tools.ask_question:ask_question
    enabled: true

  - tool_id: shell_execute_readonly
    entrypoint: assistant.agent.tools.shell_execute:shell_execute_readonly
    enabled: true
    default_params:
      shell_readonly_commands:
        - cat
        - date
        - env
        - file
        - find
        - grep
        - head
        - ls
        - pwd
        - stat
        - tail
        - wc
        - which
        - whoami

  - tool_id: shell_execute_allowlisted
    entrypoint: assistant.agent.tools.shell_execute:shell_execute_allowlisted
    enabled: true
    default_params:
      command_allowlist: []

  - tool_id: web_search
    entrypoint: assistant.agent.tools.tavily_search:get_tavily_search_tool
    enabled: true
