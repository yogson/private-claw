# Tools configuration: canonical catalog of ALL available tools
# Capabilities (config/capabilities/*.yaml) select which subset the agent can use
# enabled=false acts as global kill-switch; tools are enabled by default
# Environment override prefix: ASSISTANT_TOOLS_

tools:
  - tool_id: memory_search
    entrypoint: assistant.agent.tools.memory_search:memory_search
    enabled: true

  - tool_id: memory_propose_update
    entrypoint: assistant.agent.tools.memory_propose_update:memory_propose_update
    enabled: true

  - tool_id: ask_question
    entrypoint: assistant.agent.tools.ask_question:ask_question
    enabled: true

  - tool_id: delegate_subagent_task
    entrypoint: assistant.agent.tools.delegate_subagent_task:delegate_subagent_task
    enabled: true
    default_params:
      delegation_allowed_backends:
        - claude_code
      delegation_model_allowlist: []
      delegation_default_ttl_seconds: 3600
      delegation_max_ttl_seconds: 21600
      delegation_max_concurrent_tasks: 3
      delegation_per_task_token_cap: 120000
      delegation_per_session_token_cap: 300000
      delegation_global_token_cap: 1000000
      delegation_budget_window_seconds: 86400
      delegation_estimated_tokens_per_turn: 2000

  - tool_id: shell_execute_readonly
    entrypoint: assistant.agent.tools.shell_execute:shell_execute_readonly
    enabled: true
    default_params:
      shell_readonly_commands:
        - cat
        - date
        - env
        - file
        - find
        - grep
        - head
        - ls
        - pwd
        - stat
        - tail
        - wc
        - which
        - whoami

  - tool_id: shell_execute_allowlisted
    entrypoint: assistant.agent.tools.shell_execute:shell_execute_allowlisted
    enabled: true
    default_params:
      command_allowlist: []

  - tool_id: web_search
    entrypoint: assistant.agent.tools.tavily_search:get_tavily_search_tool
    enabled: true

  - tool_id: macos_notes_read
    entrypoint: assistant.agent.tools.macos_tools:macos_notes_read
    enabled: true

  - tool_id: macos_notes_write
    entrypoint: assistant.agent.tools.macos_tools:macos_notes_write
    enabled: true

  - tool_id: macos_reminders_read
    entrypoint: assistant.agent.tools.macos_tools:macos_reminders_read
    enabled: true

  - tool_id: macos_reminders_write
    entrypoint: assistant.agent.tools.macos_tools:macos_reminders_write
    enabled: true
