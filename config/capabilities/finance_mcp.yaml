# Finance MCP capability - provides access to financial data via kimnam1/finance-mcp
# Repository: https://github.com/kimnam1/finance-mcp
# LobeHub: https://lobehub.com/mcp/kimnam1-finance-mcp
#
# This capability enables 59 curated finance tools covering:
# - Forex exchange rates and currency conversion
# - Cryptocurrency prices, markets, and DeFi data
# - Macro economics (GDP, inflation, unemployment)
# - US Federal Reserve data (requires optional FRED_API_KEY)
# - Commodities (gold, silver, oil, etc.)
# - Stock indices, ETFs, and backtesting
# - Portfolio analytics and volatility metrics
# - Stock fundamentals, dividends, and analyst ratings
# - Earnings calendars and news
# - SEC filings, insider trades, institutional holdings
# - Treasury yields and options data
# - Market sentiment and breadth indicators
#
# Installation (Option A — local clone, stdio transport):
#   git clone https://github.com/kimnam1/finance-mcp ~/PycharmProjects/finance-mcp
#   cd ~/PycharmProjects/finance-mcp && python3 -m venv .venv
#   .venv/bin/pip install fastmcp httpx yfinance colorama
#
# mcp_servers.yaml entry:
#   - id: finance
#     transport: stdio
#     command: /Users/yogson/PycharmProjects/finance-mcp/.venv/bin/python3
#     args: ["/Users/yogson/PycharmProjects/finance-mcp/server.py"]
#     enabled: true
#     tool_policy: deny_by_default
#     # env:
#     #   FRED_API_KEY: "your_fred_key"   # optional, free at fred.stlouisfed.org
#
# Enable this capability in config.local/capabilities.yaml:
#   enabled_capabilities:
#     - finance_mcp

capability_id: finance_mcp

prompt: |
  You have access to comprehensive financial data tools via the Finance MCP server.

  **Available Data Categories:**
  - **Forex**: Real-time exchange rates, currency conversion, historical rates
  - **Crypto**: Prices, market cap rankings, historical OHLCV, DeFi TVL
  - **Macro Economics**: GDP, inflation, unemployment by country
  - **US Federal Reserve**: Fed funds rate, CPI, PCE, M2, unemployment
  - **Commodities**: Gold, silver, oil, copper, natural gas, wheat prices
  - **Stock Indices**: S&P 500, NASDAQ, Dow Jones, global indices
  - **ETFs**: Info and historical data for SPY, QQQ, ARKK, GLD, etc.
  - **Portfolio**: Correlation matrices, volatility, Sharpe ratios, backtesting
  - **Stock Fundamentals**: P/E, EPS, market cap, dividends, analyst ratings
  - **Earnings**: Calendar, estimates, surprise history
  - **SEC Data**: Filings (10-K, 10-Q, 8-K), insider trades, institutional holdings
  - **Treasury**: Yield curve, historical yields
  - **Options**: Options chains, put/call ratios, unusual activity
  - **Sentiment**: Fear & Greed Index, VIX, market breadth

  **Usage Guidelines:**
  - Use these tools when the user asks about financial markets, investments, or economic data
  - Combine multiple tools for comprehensive analysis (e.g., stock summary + analyst ratings + news)
  - For portfolio analysis, gather correlation and volatility data together
  - All tools are read-only and do not execute any trades
  - Currency codes follow ISO 4217 (USD, EUR, GBP, JPY, etc.)
  - Stock tickers use standard symbols (AAPL, MSFT, GOOGL, etc.)
  - Crypto symbols use Binance convention (BTC, ETH, SOL, etc.)

