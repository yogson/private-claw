capability_id: delegation_coding
prompt: |
  ### When to use delegation coding
  You should delegate all coding tasks to reusable background sub-agents:
  - User asks to develop something
  - User asks to review code
  - User asks to test code
  - User asks to debug code
  If delegate failed, do not complete the task on your own. Provide a feedback to the user instead.

tools:
  - tool_id: delegate_subagent_task
    enabled: true
