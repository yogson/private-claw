# Telegram channel configuration (polling mode)
# Environment override prefix: ASSISTANT_CHANNEL_TELEGRAM_

enabled: false
bot_token: ""           # Set via ASSISTANT_CHANNEL_TELEGRAM_BOT_TOKEN env var
allowlist: []           # List of allowed Telegram user IDs (integers)
poll_timeout_seconds: 30
poll_interval_seconds: 0.0
startup_drop_pending_updates: false
throttle_max_per_minute: 20
max_attachment_size_bytes: 20971520   # 20MB (Telegram bot limit)
