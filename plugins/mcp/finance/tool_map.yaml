# MCP tool mapping for finance server (kimnam1/finance-mcp)
# Repository: https://github.com/kimnam1/finance-mcp
# Capability IDs: cap.mcp.finance.<tool_name>
# Add to enabled_capabilities in config/capabilities.yaml to activate
#
# Setup (two options):
#   Option A — Local clone (stdio):
#     git clone https://github.com/kimnam1/finance-mcp
#     pip install fastmcp httpx yfinance
#     In mcp_servers.yaml: transport=stdio, command=python3, args=[/path/to/finance-mcp/server.py]
#
#   Option B — Apify hosted (streamable-http, no local install):
#     In mcp_servers.yaml: transport=streamable-http,
#       url=https://kimnam1--finance-mcp.apify.actor/mcp?token=YOUR_APIFY_TOKEN
#
# Note: This is a curated subset of the 119 available tools. Add more as needed.
# Full tool list: https://lobehub.com/mcp/kimnam1-finance-mcp

server_id: finance

tools:
  # ========================================
  # Forex Tools (5)
  # ========================================
  - tool_name: get_exchange_rate
    summary: Get real-time exchange rate between two currencies
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        from:
          type: string
          description: Source currency code (e.g., USD, EUR, GBP)
        to:
          type: string
          description: Target currency code (e.g., EUR, JPY, CNY)
      required: [from, to]

  - tool_name: convert_currency
    summary: Convert amount to multiple currencies at once
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        amount:
          type: number
          description: Amount to convert
        from:
          type: string
          description: Source currency code
        to:
          type: array
          description: List of target currency codes
      required: [amount, from, to]

  - tool_name: get_historical_rates
    summary: Get historical exchange rates over a date range
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        from:
          type: string
          description: Source currency code
        to:
          type: string
          description: Target currency code
        start_date:
          type: string
          description: Start date (YYYY-MM-DD)
        end_date:
          type: string
          description: End date (YYYY-MM-DD)
      required: [from, to, start_date, end_date]

  - tool_name: get_rate_trend
    summary: Get exchange rate trend for the last N days
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        from:
          type: string
          description: Source currency code
        to:
          type: string
          description: Target currency code
        days:
          type: integer
          description: Number of days for trend analysis
      required: [from, to]

  - tool_name: list_supported_currencies
    summary: List all supported currency codes (~30 major currencies)
    risk_class: readonly
    requires_confirmation: false

  # ========================================
  # Cryptocurrency Tools (4)
  # ========================================
  - tool_name: get_crypto_price
    summary: Get real-time price and 24h stats for any Binance trading pair
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Crypto symbol (e.g., BTC, ETH, SOL)
      required: [symbol]

  - tool_name: get_crypto_market
    summary: Get top N cryptocurrencies ranked by market cap
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        limit:
          type: integer
          description: Number of coins to return (default 10)

  - tool_name: get_crypto_historical
    summary: Get OHLCV candles (daily, 4h, or hourly) for any crypto
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Crypto symbol (e.g., BTC, ETH)
        interval:
          type: string
          description: Candle interval (1d, 4h, 1h)
        limit:
          type: integer
          description: Number of candles
      required: [symbol]

  - tool_name: compare_crypto
    summary: Side-by-side comparison of multiple cryptocurrencies
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbols:
          type: array
          description: List of crypto symbols to compare
      required: [symbols]

  # ========================================
  # Macro Economics Tools (7)
  # ========================================
  - tool_name: get_gdp
    summary: Get GDP (total or per capita) for any country
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        country:
          type: string
          description: Country code (e.g., US, CN, DE)
        type:
          type: string
          description: GDP type (total or per_capita)
      required: [country]

  - tool_name: get_inflation
    summary: Get annual CPI inflation rate by country
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        country:
          type: string
          description: Country code
      required: [country]

  - tool_name: get_macro_overview
    summary: Get GDP, inflation, and unemployment in one call
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        country:
          type: string
          description: Country code
      required: [country]

  - tool_name: compare_gdp_growth
    summary: Compare GDP growth rate across multiple countries
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        countries:
          type: array
          description: List of country codes
      required: [countries]

  - tool_name: get_interest_rate
    summary: Get lending interest rate history by country
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        country:
          type: string
          description: Country code
      required: [country]

  - tool_name: compare_interest_rates
    summary: Compare interest rates across multiple countries
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        countries:
          type: array
          description: List of country codes
      required: [countries]

  - tool_name: compare_population
    summary: Compare population trends across countries
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        countries:
          type: array
          description: List of country codes
      required: [countries]

  # ========================================
  # US Federal Reserve Tools (5) - Enhanced with FRED_API_KEY
  # ========================================
  - tool_name: get_fed_funds_rate
    summary: Get Federal funds rate history and current value
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_us_cpi
    summary: Get US CPI inflation and year-over-year change rate
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_us_pce
    summary: Get PCE price index vs 2% target
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_us_m2
    summary: Get M2 money supply (billions USD) with MoM/YoY changes
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_us_unemployment
    summary: Get US unemployment rate history
    risk_class: readonly
    requires_confirmation: false

  # ========================================
  # Commodities Tools (2)
  # ========================================
  - tool_name: get_commodity_price
    summary: Get gold price (USD/oz via PAXG)
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_commodity_prices
    summary: Get prices for silver, oil, copper, natural gas, wheat
    risk_class: readonly
    requires_confirmation: false

  # ========================================
  # Stock Indices Tools (2)
  # ========================================
  - tool_name: get_stock_index
    summary: Get current level and daily change for major stock indices
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        index:
          type: string
          description: Index symbol (e.g., SPY, QQQ, DIA, IWM)
      required: [index]

  - tool_name: compare_stock_indices
    summary: Side-by-side comparison of global stock indices
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        indices:
          type: array
          description: List of index symbols
      required: [indices]

  # ========================================
  # ETFs & Backtesting Tools (3)
  # ========================================
  - tool_name: get_etf_info
    summary: Get current price and stats for any ETF (SPY, QQQ, ARKK, GLD...)
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: ETF symbol
      required: [symbol]

  - tool_name: get_index_history
    summary: Get historical OHLCV for indices and ETFs
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Index or ETF symbol
        interval:
          type: string
          description: Candle interval
        limit:
          type: integer
          description: Number of data points
      required: [symbol]

  - tool_name: backtest_buy_hold
    summary: Calculate buy-and-hold returns for stocks, ETFs, or crypto
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Asset symbol
        start_date:
          type: string
          description: Start date (YYYY-MM-DD)
        end_date:
          type: string
          description: End date (YYYY-MM-DD)
        initial_investment:
          type: number
          description: Initial investment amount
      required: [symbol, start_date, end_date]

  # ========================================
  # Portfolio Analytics Tools (3)
  # ========================================
  - tool_name: get_asset_correlation
    summary: Get Pearson correlation matrix for 2-6 assets
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbols:
          type: array
          description: List of asset symbols (2-6)
      required: [symbols]

  - tool_name: get_portfolio_volatility
    summary: Calculate annualized return, volatility, Sharpe ratio, max drawdown
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbols:
          type: array
          description: List of asset symbols
        weights:
          type: array
          description: Portfolio weights (must sum to 1)
      required: [symbols, weights]

  - tool_name: get_fear_greed_index
    summary: Get Crypto Fear & Greed Index - current score and 7-day history
    risk_class: readonly
    requires_confirmation: false

  # ========================================
  # Stock Fundamentals & Analysis (4)
  # ========================================
  - tool_name: get_dividend_info
    summary: Get trailing yield, payout ratio, ex-dividend date, 5-yr average
