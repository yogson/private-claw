          description: Stock ticker symbol
      required: [symbol]

  - tool_name: get_insider_sentiment
    summary: Get Form 4 aggregate - net buy/sell, top transactions
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
