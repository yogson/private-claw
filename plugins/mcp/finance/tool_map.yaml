          type: string
          description: Stock ticker symbol
        filing_type:
          type: string
          description: Filing type (10-K, 10-Q, 8-K)
      required: [symbol]

  - tool_name: get_insider_trades
    summary: Get Form 4 insider buy/sell filings for any ticker
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Stock ticker symbol
      required: [symbol]

  - tool_name: get_company_facts
    summary: Get XBRL financial facts - Revenue, NetIncome, Assets, EPS
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Stock ticker symbol
      required: [symbol]

  - tool_name: get_institutional_holdings
    summary: Get top 10 institutional and top 5 mutual fund holders
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Stock ticker symbol
      required: [symbol]

  - tool_name: get_short_interest
    summary: Get shares short, days-to-cover, float%, squeeze risk
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Stock ticker symbol
      required: [symbol]

  # ========================================
  # Treasury & Options Tools (4)
  # ========================================
  - tool_name: get_treasury_yield_curve
    summary: Get full yield curve (1M-30Y), shape, 10Y-3M spread
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_historical_treasury_yields
    summary: Get 1M-30Y yield history with min/max/mean stats
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_options_chain
    summary: Get options chain - calls, puts, strikes, bid/ask, volume, OI, IV
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Stock ticker symbol
        expiration:
          type: string
          description: Options expiration date (YYYY-MM-DD)
      required: [symbol]

  - tool_name: get_options_flow
    summary: Get put/call ratio, sentiment label, unusual contracts
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        symbol:
          type: string
          description: Stock ticker symbol
      required: [symbol]

  # ========================================
  # Advanced Analysis Tools (8)
  # ========================================
  - tool_name: get_macro_dashboard
    summary: Get VIX, DXY, S&P 500, yields, and macro regime indicator
    risk_class: readonly
    requires_confirmation: false

  - tool_name: get_earnings_surprise
    summary: Get EPS surprise %, beat rate, consensus vs actual
