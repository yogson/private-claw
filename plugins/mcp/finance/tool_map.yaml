  - tool_name: get_stock_screener
    summary: Filter S&P 500 by P/E, yield, market cap, sector
    risk_class: readonly
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        min_pe:
          type: number
          description: Minimum P/E ratio
        max_pe:
          type: number
          description: Maximum P/E ratio
        min_yield:
          type: number
          description: Minimum dividend yield
